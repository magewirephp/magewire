name: 'Mago'

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:

  mago:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Mago
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://carthage.software/mago.sh | sh -s -- --to "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Mago lint
        run: mago lint --reporting-format=github

      - name: Mago analyze
        run: mago analyze --reporting-format=github

      - name: Mago format check
        run: mago format --dry-run